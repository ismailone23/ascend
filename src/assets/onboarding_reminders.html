<!DOCTYPE html>
<html class="dark" lang="en" style="">
<head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>HabitFlow - Reminders</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Geist:wght@400;500;600&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
<!-- Tailwind Configuration -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                "on-tertiary": "#510074",
                "surface-container-high": "#2a2a2a",
                "secondary": "#ffb693",
                "primary-fixed": "#61ff97",
                "surface-container-highest": "#353534",
                "on-tertiary-fixed": "#310048",
                "on-surface": "#e5e2e1",
                "surface-container-low": "#1c1b1b",
                "on-error-container": "#ffdad6",
                "primary": "#f0ffee",
                "outline": "#849584",
                "inverse-on-surface": "#313030",
                "tertiary-container": "#f4d3ff",
                "surface-dim": "#131313",
                "surface": "#131313",
                "on-secondary": "#561f00",
                "secondary-fixed-dim": "#ffb693",
                "secondary-fixed": "#ffdbcc",
                "outline-variant": "#3b4b3d",
                "surface-variant": "#353534",
                "on-primary-fixed": "#00210c",
                "surface-tint": "#00e476",
                "primary-fixed-dim": "#00e476",
                "inverse-surface": "#e5e2e1",
                "tertiary": "#fff9fb",
                "surface-bright": "#393939",
                "on-primary-container": "#007137",
                "inverse-primary": "#006d35",
                "tertiary-fixed-dim": "#e9b3ff",
                "error-container": "#93000a",
                "tertiary-fixed": "#f6d9ff",
                "on-primary": "#003919",
                "secondary-container": "#fe6b00",
                "surface-container-lowest": "#0e0e0e",
                "primary-container": "#00ff85",
                "on-error": "#690005",
                "on-secondary-fixed-variant": "#7a3000",
                "on-secondary-fixed": "#351000",
                "error": "#ffb4ab",
                "on-surface-variant": "#b9cbb9",
                "on-tertiary-container": "#932bc7",
                "on-primary-fixed-variant": "#005227",
                "on-tertiary-fixed-variant": "#7200a3",
                "on-secondary-container": "#572000",
                "background": "#131313",
                "surface-container": "#201f1f",
                "on-background": "#e5e2e1"
            },
            "borderRadius": {
                "DEFAULT": "0.25rem",
                "lg": "0.5rem",
                "xl": "0.75rem",
                "full": "9999px"
            },
            "spacing": {
                "element-padding": "16px",
                "section-gap": "40px",
                "grid-gap": "4px",
                "container-margin": "24px"
            },
            "fontFamily": {
                "headline-lg-mobile": ["Inter"],
                "headline-lg": ["Inter"],
                "label-sm": ["Geist"],
                "display": ["Inter"],
                "body-md": ["Inter"],
                "mono-data": ["Geist"]
            },
            "fontSize": {
                "headline-lg-mobile": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                "headline-lg": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "600"}],
                "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}],
                "display": ["40px", {"lineHeight": "48px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                "body-md": ["16px", {"lineHeight": "24px", "fontWeight": "400"}],
                "mono-data": ["14px", {"lineHeight": "20px", "fontWeight": "600"}]
            }
          },
        },
      }
    </script>
<style>
    body {
        background-color: #131313;
        color: #e5e2e1;
        margin: 0;
        overflow: hidden;
        height: 100vh;
        display: flex;
        flex-direction: column;
    }
    .neon-glow {
        filter: drop-shadow(0 0 15px rgba(0, 255, 133, 0.4));
    }
    .luminous-grid-bg {
        background-image: 
            linear-gradient(to right, #1e1e1e 1px, transparent 1px),
            linear-gradient(to bottom, #1e1e1e 1px, transparent 1px);
        background-size: 32px 32px;
    }
    .shimmer {
        background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.05), transparent);
        background-size: 200% 100%;
        animation: shimmer 3s infinite;
    }
    @keyframes shimmer { 0% { background-position: -200% 0; } 100% { background-position: 200% 0; } }
    .floating { animation: floating 4s ease-in-out infinite; }
    @keyframes floating { 0%, 100% { transform: translateY(0px); } 50% { transform: translateY(-10px); } }
</style>
</head>
<body class="font-body-md text-on-surface">
<!-- Hero Content Canvas -->
<main class="flex-grow flex flex-col items-center justify-center px-container-margin relative overflow-hidden luminous-grid-bg">
<!-- Decorative Ambient Light -->
<div class="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[500px] h-[500px] bg-primary-container opacity-5 blur-[120px] rounded-full pointer-events-none"></div>
<!-- Progress Indicator (Step 3 of 4) -->
<div class="absolute top-12 flex space-x-2">
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
<div class="w-8 h-2 rounded-full bg-primary-container transition-all duration-500"></div>
<div class="w-2 h-2 rounded-full bg-surface-container-highest"></div>
</div>
<!-- Central High-Tech Notification Graphic -->
<div class="relative w-full max-w-[320px] aspect-square flex items-center justify-center mb-12 floating">
<!-- Aura Rings -->
<div class="absolute inset-0 border border-primary/10 rounded-full animate-ping [animation-duration:4s]"></div>
<div class="absolute inset-8 border border-primary/20 rounded-full animate-pulse"></div>
<!-- The Card -->
<div class="relative z-10 w-64 h-40 bg-surface-container-low border border-outline-variant rounded-xl p-5 flex flex-col justify-between shadow-2xl neon-glow">
<div class="flex items-center justify-between">
<div class="flex items-center gap-2">
<div class="w-8 h-8 rounded-lg bg-primary-container flex items-center justify-center">
<span class="material-symbols-outlined text-on-primary-container text-[20px]" style="font-variation-settings: \"FILL\" 1;">notifications</span>
</div>
<span class="font-mono-data text-label-sm text-primary-fixed tracking-wider uppercase">HabitFlow</span>
</div>
<span class="text-[10px] font-label-sm text-outline opacity-70">Just Now</span>
</div>
<div class="space-y-1">
<div class="h-3 w-3/4 bg-on-surface rounded-full opacity-90"></div>
<div class="h-2 w-1/2 bg-on-surface rounded-full opacity-40"></div>
</div>
<div class="flex gap-2">
<div class="h-6 w-16 bg-primary-container/20 rounded-md border border-primary-container/30"></div>
<div class="h-6 w-12 bg-surface-container-high rounded-md"></div>
</div>
<!-- Glow effect behind the bell icon in the notification card -->
<div class="absolute -top-2 -right-2 w-12 h-12 bg-primary-container/10 blur-xl"></div>
</div>
<!-- Floating Heatmap Cells for aesthetic consistency -->
<div class="absolute -top-4 -left-4 grid grid-cols-2 gap-grid-gap">
<div class="w-4 h-4 rounded bg-primary-container/20"></div>
<div class="w-4 h-4 rounded bg-primary-container/80"></div>
<div class="w-4 h-4 rounded bg-primary-container/40"></div>
<div class="w-4 h-4 rounded bg-primary-container/10 border border-outline-variant"></div>
</div>
</div>
<!-- Text Content -->
<div class="text-center max-w-md w-full animate-in fade-in slide-in-from-bottom-4 duration-700" style="animation-delay: 0ms;">
<h1 class="font-headline-lg-mobile text-headline-lg-mobile md:font-headline-lg md:text-headline-lg text-primary-fixed mb-4">
                Stay on Track
</h1>
<p class="font-body-md text-body-md text-on-surface-variant leading-relaxed px-4">
                Get gentle reminders when it's time to build your habits. We'll help you maintain your streak without the noise.
</p>
</div>
</main>
<!-- Navigation Footer -->
<footer class="p-container-margin pb-12 w-full max-w-md mx-auto flex flex-col items-center gap-6">
<!-- Primary Action -->

<!-- Secondary Action -->

</footer>
<!-- Interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const primaryBtn = document.querySelector('button.bg-primary-container');
            const secondaryBtn = document.querySelector('button.text-on-surface-variant');
            primaryBtn.addEventListener('click', () => {
                primaryBtn.classList.add('scale-90');
                setTimeout(() => {
                    primaryBtn.classList.remove('scale-90');
                    alert('Notifications requested');
                }, 150);
            });
            secondaryBtn.addEventListener('click', () => {
                secondaryBtn.classList.add('opacity-50');
                setTimeout(() => {
                    secondaryBtn.classList.remove('opacity-50');
                }, 150);
            });
            // Smooth entrance for page elements
            const elements = document.querySelectorAll('.animate-in');
            elements.forEach((el, index) => {
                el.style.animationDelay = `${index * 100}ms`;
            });
        });
    </script>
</body>
</html>
